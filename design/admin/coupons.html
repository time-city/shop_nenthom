<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mã Giảm giá - ChamCham Admin</title>
    <meta name="description" content="Quản lý mã giảm giá ChamCham">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="images/logo.svg" alt="ChamCham" class="sidebar-logo">
            <div class="sidebar-brand">
                <span class="sidebar-brand-name">ChamCham</span>
                <span class="sidebar-brand-sub">Admin Panel</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">
                <div class="sidebar-section-title">Tổng quan</div>
                <a href="dashboard.html" class="sidebar-link">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Dashboard
                </a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Quản lý</div>
                <a href="orders.html" class="sidebar-link">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    Đơn hàng
                    <span class="sidebar-badge">3</span>
                </a>
                <a href="products.html" class="sidebar-link">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    Sản phẩm
                </a>
                <a href="materials.html" class="sidebar-link">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    Kho nguyên liệu
                </a>
                <a href="coupons.html" class="sidebar-link active">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    Mã giảm giá
                </a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Khác</div>
                <a href="support.html" class="sidebar-link">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Hỗ trợ
                    <span class="sidebar-badge">3</span>
                </a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-avatar">AD</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name">Admin ChamCham</div>
                    <div class="sidebar-user-role">Quản trị viên</div>
                </div>
            </div>
            <button class="sidebar-logout" onclick="logout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Đăng xuất
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <header class="top-header">
            <div class="top-header-left">
                <button class="mobile-toggle" aria-label="Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="page-title">Mã Giảm giá</h1>
                <p class="page-subtitle">Quản lý coupon và khuyến mãi</p>
            </div>
            <div class="top-header-right">
                <button class="btn btn-primary" onclick="openCouponModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Thêm mã giảm giá
                </button>
            </div>
        </header>

        <div class="page-content">
            <div class="card">
                <div class="card-body no-padding">
                    <div class="table-wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Mã code</th>
                                    <th>Loại giảm</th>
                                    <th>Giá trị</th>
                                    <th>Đã dùng / Tối đa</th>
                                    <th>Ngày hết hạn</th>
                                    <th>Trạng thái</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="couponsBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Coupon Modal -->
<div class="modal-overlay" id="couponModal">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="couponModalTitle">Thêm mã giảm giá</h3>
            <button class="modal-close" onclick="closeModal('couponModal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Mã code</label>
                <input type="text" class="form-input" id="cCode" placeholder="Ví dụ: WELCOME10" style="text-transform:uppercase;">
            </div>
            <div class="form-group">
                <label class="form-label">Loại giảm giá</label>
                <div style="display:flex;gap:1.5rem;margin-top:0.5rem;">
                    <label class="form-check">
                        <input type="radio" name="cType" value="percent" checked> Phần trăm (%)
                    </label>
                    <label class="form-check">
                        <input type="radio" name="cType" value="fixed"> Cố định (VND)
                    </label>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" id="valueLabel">Mức giảm (%)</label>
                    <input type="number" class="form-input" id="cValue" placeholder="Ví dụ: 10">
                </div>
                <div class="form-group">
                    <label class="form-label">Số lượt tối đa</label>
                    <input type="number" class="form-input" id="cMax" placeholder="Ví dụ: 100">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Ngày hết hạn</label>
                <input type="date" class="form-input" id="cExpiry">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('couponModal')">Hủy</button>
            <button class="btn btn-primary" onclick="saveCoupon()">Lưu mã giảm giá</button>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
<script>
    function renderCoupons() {
        const tbody = document.getElementById('couponsBody');
        tbody.innerHTML = '';
        MOCK_DATA.coupons.forEach(c => {
            const isExpired = new Date(c.expiry) < new Date();
            const isFull = c.used >= c.max;
            let statusBadge;
            if (isExpired) statusBadge = '<span class="badge badge-danger badge-dot">Hết hạn</span>';
            else if (isFull) statusBadge = '<span class="badge badge-neutral badge-dot">Hết lượt</span>';
            else statusBadge = '<span class="badge badge-success badge-dot">Hoạt động</span>';

            const usagePercent = Math.round((c.used / c.max) * 100);

            tbody.innerHTML += `
                <tr>
                    <td>
                        <code style="background:var(--admin-primary-soft);color:var(--admin-primary);padding:4px 10px;border-radius:6px;font-weight:600;font-size:0.85rem;letter-spacing:0.05em;">${c.code}</code>
                    </td>
                    <td><span class="badge ${c.type === 'percent' ? 'badge-info' : 'badge-primary'}">${c.type === 'percent' ? 'Phần trăm' : 'Cố định'}</span></td>
                    <td><strong>${c.type === 'percent' ? c.value + '%' : formatCurrency(c.value)}</strong></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:0.5rem;">
                            <div style="flex:1;height:6px;background:var(--admin-cream);border-radius:3px;max-width:80px;">
                                <div style="height:100%;width:${usagePercent}%;background:${usagePercent >= 90 ? 'var(--admin-danger)' : 'var(--admin-primary)'};border-radius:3px;transition:width 0.3s;"></div>
                            </div>
                            <span class="font-sm">${c.used}/${c.max}</span>
                        </div>
                    </td>
                    <td>${formatDate(c.expiry)}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <div style="display:flex;gap:0.35rem;">
                            <button class="btn-icon" title="Sửa" onclick="editCoupon(${c.id})">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button class="btn-icon" title="Xóa" style="color:var(--admin-danger)" onclick="deleteCoupon(${c.id})">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    function openCouponModal() {
        document.getElementById('couponModalTitle').textContent = 'Thêm mã giảm giá';
        document.getElementById('cCode').value = '';
        document.getElementById('cValue').value = '';
        document.getElementById('cMax').value = '';
        document.getElementById('cExpiry').value = '';
        document.querySelector('input[name="cType"][value="percent"]').checked = true;
        updateValueLabel();
        openModal('couponModal');
    }

    function editCoupon(id) {
        const c = MOCK_DATA.coupons.find(x => x.id === id);
        if (!c) return;
        document.getElementById('couponModalTitle').textContent = 'Sửa mã giảm giá';
        document.getElementById('cCode').value = c.code;
        document.getElementById('cValue').value = c.value;
        document.getElementById('cMax').value = c.max;
        document.getElementById('cExpiry').value = c.expiry;
        document.querySelector(`input[name="cType"][value="${c.type}"]`).checked = true;
        updateValueLabel();
        openModal('couponModal');
    }

    function saveCoupon() {
        const code = document.getElementById('cCode').value;
        const value = document.getElementById('cValue').value;
        const max = document.getElementById('cMax').value;
        const expiry = document.getElementById('cExpiry').value;
        if (!code || !value || !max || !expiry) {
            showToast('Vui lòng điền đầy đủ thông tin', 'warning');
            return;
        }
        showToast('Đã lưu mã giảm giá!', 'success');
        closeModal('couponModal');
    }

    function deleteCoupon(id) {
        if (confirm('Bạn có chắc muốn xóa mã giảm giá này?')) {
            showToast('Đã xóa mã giảm giá', 'success');
        }
    }

    function updateValueLabel() {
        const type = document.querySelector('input[name="cType"]:checked').value;
        document.getElementById('valueLabel').textContent = type === 'percent' ? 'Mức giảm (%)' : 'Mức giảm (VND)';
    }

    // Radio change
    document.querySelectorAll('input[name="cType"]').forEach(r => {
        r.addEventListener('change', updateValueLabel);
    });

    renderCoupons();
</script>
</body>
</html>
