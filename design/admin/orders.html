<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đơn hàng - ChamCham Admin</title>
    <meta name="description" content="Quản lý đơn hàng ChamCham">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="images/logo.svg" alt="ChamCham" class="sidebar-logo">
            <div class="sidebar-brand">
                <span class="sidebar-brand-name">ChamCham</span>
                <span class="sidebar-brand-sub">Admin Panel</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">
                <div class="sidebar-section-title">Tổng quan</div>
                <a href="dashboard.html" class="sidebar-link">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Dashboard
                </a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Quản lý</div>
                <a href="orders.html" class="sidebar-link active">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    Đơn hàng
                    <span class="sidebar-badge">3</span>
                </a>
                <a href="products.html" class="sidebar-link">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    Sản phẩm
                </a>
                <a href="materials.html" class="sidebar-link">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    Kho nguyên liệu
                </a>
                <a href="coupons.html" class="sidebar-link">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    Mã giảm giá
                </a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Khác</div>
                <a href="support.html" class="sidebar-link">
                    <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Hỗ trợ
                    <span class="sidebar-badge">3</span>
                </a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-avatar">AD</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name">Admin ChamCham</div>
                    <div class="sidebar-user-role">Quản trị viên</div>
                </div>
            </div>
            <button class="sidebar-logout" onclick="logout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Đăng xuất
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <header class="top-header">
            <div class="top-header-left">
                <button class="mobile-toggle" aria-label="Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="page-title">Quản lý Đơn hàng</h1>
                <p class="page-subtitle">Tất cả đơn hàng của cửa hàng</p>
            </div>
        </header>

        <div class="page-content">
            <!-- Filter Bar -->
            <div class="card" style="margin-bottom: 1.5rem;">
                <div class="card-body" style="padding: 1rem 1.5rem;">
                    <div class="filter-bar">
                        <div style="position:relative;flex:1;max-width:320px;">
                            <svg style="position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);opacity:0.4;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" class="form-input" placeholder="Tìm theo mã đơn hàng..." id="searchInput" style="padding-left:2.5rem;">
                        </div>
                        <select class="form-select" id="statusFilter" style="max-width:200px;">
                            <option value="">Tất cả trạng thái</option>
                            <option value="pending">Chờ xác nhận</option>
                            <option value="processing">Đang xử lý</option>
                            <option value="shipping">Đang giao</option>
                            <option value="completed">Hoàn thành</option>
                            <option value="cancelled">Đã hủy</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="card">
                <div class="card-body no-padding">
                    <div class="table-wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Mã đơn</th>
                                    <th>Ngày đặt</th>
                                    <th>Khách hàng</th>
                                    <th>Tổng tiền</th>
                                    <th>Trạng thái</th>
                                    <th>Thanh toán</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody"></tbody>
                        </table>
                    </div>
                    <div class="pagination" id="pagination">
                        <button class="pagination-btn" disabled>‹</button>
                        <button class="pagination-btn active">1</button>
                        <button class="pagination-btn">2</button>
                        <button class="pagination-btn">3</button>
                        <button class="pagination-btn">›</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
<script>
    let filteredOrders = [...MOCK_DATA.orders];

    function renderOrders(orders) {
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = '';
        orders.forEach(o => {
            tbody.innerHTML += `
                <tr style="cursor:pointer" onclick="window.location.href='order-detail.html?id=${o.id}'">
                    <td><strong style="color:var(--admin-primary)">${o.id}</strong></td>
                    <td>${formatDateTime(o.date)}</td>
                    <td>${o.customer}</td>
                    <td class="table-amount">${formatCurrency(o.total)}</td>
                    <td>${getOrderStatusBadge(o.status)}</td>
                    <td>${getPaymentStatusBadge(o.payment)}</td>
                    <td>
                        <button class="btn-icon" title="Xem chi tiết" onclick="event.stopPropagation(); window.location.href='order-detail.html?id=${o.id}'">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </td>
                </tr>`;
        });
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', function() {
        filterOrders();
    });

    // Status Filter
    document.getElementById('statusFilter').addEventListener('change', function() {
        filterOrders();
    });

    function filterOrders() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        filteredOrders = MOCK_DATA.orders.filter(o => {
            const matchSearch = !search || o.id.toLowerCase().includes(search) || o.customer.toLowerCase().includes(search);
            const matchStatus = !status || o.status === status;
            return matchSearch && matchStatus;
        });
        renderOrders(filteredOrders);
    }

    // Initial render
    renderOrders(MOCK_DATA.orders);
</script>
</body>
</html>
